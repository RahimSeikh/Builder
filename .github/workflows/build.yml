name: Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout job branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Flatten dist (SPA layout)
        run: |
          set -e
          if [ ! -d dist ]; then
            echo "::error::No dist/ directory was produced by 'npm run build'."
            exit 1
          fi
          # If index.html is not already at dist/index.html, find one inside dist/
          # and promote its containing folder to be the new dist/ root.
          if [ ! -f dist/index.html ]; then
            HTML_PATH="$(find dist -maxdepth 4 -type f -name index.html | head -n 1 || true)"
            if [ -z "$HTML_PATH" ]; then
              echo "::error::No index.html found anywhere in dist/."
              echo "::error::This looks like a pure SSR project (e.g. TanStack Start, Next.js, Remix in SSR mode)."
              echo "::error::This build service only supports static SPA projects. Switch your project to a standard Vite + React SPA build (no SSR plugin) and try again."
              echo "dist/ contents:"
              find dist -maxdepth 3 -print
              exit 1
            fi
            HTML_DIR="$(dirname "$HTML_PATH")"
            echo "Detected SSR-style build output. Promoting '$HTML_DIR' to be the dist/ root."
            rm -rf dist-out
            mv "$HTML_DIR" dist-out
            rm -rf dist
            mv dist-out dist
          fi
          echo "Final dist/ contents:"
          ls -la dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
