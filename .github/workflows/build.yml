name: Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout job branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Flatten dist (SPA layout)
        run: |
          if [ -d dist/client ] && [ -f dist/client/index.html ]; then
            echo "Detected SSR-style build output (dist/client + dist/server). Using dist/client as the artifact."
            rm -rf dist-out
            mv dist/client dist-out
            rm -rf dist
            mv dist-out dist
          fi
          echo "Final dist/ contents:"
          ls -la dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
